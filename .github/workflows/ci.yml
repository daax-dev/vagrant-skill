name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install Ruby (for Vagrantfile syntax check)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run tests
        run: make test

  validate-skill:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Agent Skills spec
        run: |
          # Validator requires directory name to match skill name
          mkdir -p /tmp/vagrant
          cp -r ./* ./.* /tmp/vagrant/ 2>/dev/null || true
          npx --yes skills-ref validate /tmp/vagrant
