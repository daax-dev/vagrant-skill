name: Publish to npm

on:
  release:
    types: [published]

# Trusted publishing: OIDC replaces long-lived NPM_TOKEN.
# Setup: npmjs.com → @daax-dev/vagrant-skill → Settings → Trusted Publisher
#   - Provider: GitHub Actions
#   - Organization: daax-dev
#   - Repository: vagrant-skill
#   - Workflow: publish.yml

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck bats

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Agent Skills spec
        run: |
          mkdir -p /tmp/vagrant
          cp -r ./* ./.* /tmp/vagrant/ 2>/dev/null || true
          npx --yes skills-ref validate /tmp/vagrant

  publish:
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-skill]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish
