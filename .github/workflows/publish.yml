name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        id: check
        run: |
          if git tag --list "v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.pkg.outputs.version }} already tagged — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install shellcheck and bats
        if: steps.check.outputs.skip == 'false'
        run: sudo apt-get install -y shellcheck bats

      - name: Install Ruby
        if: steps.check.outputs.skip == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Lint
        if: steps.check.outputs.skip == 'false'
        run: make lint

      - name: Test
        if: steps.check.outputs.skip == 'false'
        run: make test

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Validate Agent Skills spec
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p /tmp/vagrant
          cp -r ./* ./.* /tmp/vagrant/ 2>/dev/null || true
          npx --yes skills-ref validate /tmp/vagrant

      - name: Publish to ClawHub
        if: steps.check.outputs.skip == 'false'
        run: |
          npx --yes clawhub@latest login --token "$CLAWHUB_TOKEN" --no-browser
          npx --yes clawhub@latest publish . --version "${{ steps.pkg.outputs.version }}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
