name: Publish to ClawHub

on:
  release:
    types: [published]

# Requires CLAWHUB_TOKEN stored as a GitHub Actions secret.
# Setup: clawhub.ai → Account Settings → API Tokens → New Token
# Then: GitHub repo → Settings → Secrets → Actions → CLAWHUB_TOKEN

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck and bats
        run: sudo apt-get install -y shellcheck bats

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate Agent Skills spec
        run: |
          mkdir -p /tmp/vagrant
          cp -r ./* ./.* /tmp/vagrant/ 2>/dev/null || true
          npx --yes skills-ref validate /tmp/vagrant

  publish:
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-skill]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Sync version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to ClawHub
        run: npx --yes clawhub@latest publish --scope @jpoley
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
